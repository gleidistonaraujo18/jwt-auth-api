services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-auth-api-app
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: jwt_auth
      DB_USERNAME: jwt_auth
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: jwt-auth-api-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: jwt_auth
      MYSQL_USER: jwt_auth
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
